<section>
  <div class="discriptio">
    <p class="head" id="about">{{ about }}</p>
    <div>
      <p>{{ way }}</p>
    </div>

    <figure>
      <div class="box-hover">
        <img
          class="icons-default"
          src="assets/img/about-me/location-default.svg"
          alt="location"
        />
      </div>
      <figcaption>{{ place }}</figcaption>
    </figure>
    <figure>
      <div class="box-hover">
        <img
          class="icons-default"
          src="assets/img/about-me/bulb-default.svg"
          alt="light-bulb"
        />
      </div>
      <figcaption>{{ enthusiasm }}</figcaption>
    </figure>

    <figure>
      <div class="box-hover">
        <img
          class="icons-default"
          src="assets/img/about-me/puzzel-default.svg"
          alt="puzzles"
        />
      </div>
      <figcaption>{{ solutions }}</figcaption>
    </figure>
  </div>
  <div class="shadow">
    <img src="assets/shadows/purple-shadow-about-me.png" alt="" />
  </div>
  <div class="picture">
    <img src="assets/img/head.png" alt="" />
  </div>
  <div class="border_line">
    <div class="line"></div>
  </div>
</section>
